<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndustryPulse — 产业热点时间轴</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #F8F9FB;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #EEF1F5;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-muted: #9CA3AF;
            --accent-primary: #0F766E;
            --accent-hover: #0D5D56;
            --accent-light: #CCFBF1;
            --accent-secondary: #7C3AED;
            --accent-secondary-light: #EDE9FE;
            --type-policy: #DC2626;
            --type-funding: #059669;
            --type-product: #2563EB;
            --type-ma: #D97706;
            --type-tech: #7C3AED;
            --type-report: #0891B2;
            --type-person: #DB2777;
            --border: #E5E7EB;
            --shadow: rgba(0, 0, 0, 0.06);
            --shadow-hover: rgba(0, 0, 0, 0.12);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ===== Header ===== */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .logo-text {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 26px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-left: 16px;
            padding-left: 16px;
            border-left: 1px solid var(--border);
        }

        /* ===== Hero Input Area ===== */
        .hero {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 40px 40px 48px;
        }

        .hero-inner {
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 32px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
        }

        .hero-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }

        .search-panel {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .search-row {
            display: flex;
            gap: 16px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 240px;
        }

        .input-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .keyword-input-wrapper {
            position: relative;
        }

        .keyword-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            font-family: inherit;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 200ms ease;
            outline: none;
        }

        .keyword-input::placeholder {
            color: var(--text-muted);
        }

        .keyword-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-light);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .keyword-input:focus ~ .input-icon {
            color: var(--accent-primary);
        }

        /* Quick Tags */
        .quick-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-tag {
            font-size: 13px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 200ms ease;
        }

        .quick-tag:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: var(--accent-light);
        }

        /* Time Range Selector */
        .time-range-group {
            display: flex;
            gap: 4px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }

        .time-btn {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 200ms ease;
        }

        .time-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .time-btn.active {
            background: var(--accent-primary);
            color: #fff;
        }

        /* Generate Button */
        .generate-btn {
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-hover));
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 200ms ease;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .generate-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 118, 110, 0.3);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        /* ===== Main Layout ===== */
        .main-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px 40px;
            gap: 40px;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            position: sticky;
            top: 24px;
            height: fit-content;
        }

        .sidebar-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .sidebar-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Type Filters */
        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 200ms ease;
            border: 1px solid transparent;
        }

        .filter-item:hover {
            background: var(--bg-tertiary);
        }

        .filter-item.active {
            background: var(--bg-tertiary);
            border-color: var(--border);
        }

        .filter-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms ease;
            flex-shrink: 0;
        }

        .filter-item.active .filter-checkbox {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .filter-checkbox svg {
            opacity: 0;
            transition: opacity 200ms ease;
        }

        .filter-item.active .filter-checkbox svg {
            opacity: 1;
        }

        .filter-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .filter-name {
            font-size: 14px;
            color: var(--text-primary);
            flex: 1;
        }

        .filter-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-tertiary);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-item {
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 16px 12px;
            text-align: center;
        }

        .stat-value {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Export Buttons */
        .export-buttons {
            display: flex;
            gap: 8px;
        }

        .export-btn {
            flex: 1;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            padding: 10px 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 200ms ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .export-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: var(--accent-light);
        }

        /* ===== Timeline ===== */
        .timeline-container {
            position: relative;
        }

        .timeline-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .timeline-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timeline-title h2 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 22px;
            font-weight: 600;
        }

        .timeline-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            padding: 4px 10px;
            background: var(--accent-light);
            color: var(--accent-primary);
            border-radius: 12px;
        }

        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 3px;
        }

        .view-btn {
            font-family: inherit;
            font-size: 12px;
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 200ms ease;
        }

        .view-btn.active {
            background: var(--bg-secondary);
            color: var(--text-primary);
            box-shadow: 0 1px 3px var(--shadow);
        }

        /* Timeline Line */
        .timeline {
            position: relative;
            padding-left: 32px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent-primary), var(--accent-light));
            border-radius: 1px;
        }

        /* Timeline Node */
        .timeline-node {
            position: relative;
            padding-bottom: 28px;
            opacity: 0;
            transform: translateX(-10px);
            animation: nodeAppear 400ms ease forwards;
        }

        .timeline-node:nth-child(1) { animation-delay: 0ms; }
        .timeline-node:nth-child(2) { animation-delay: 80ms; }
        .timeline-node:nth-child(3) { animation-delay: 160ms; }
        .timeline-node:nth-child(4) { animation-delay: 240ms; }
        .timeline-node:nth-child(5) { animation-delay: 320ms; }
        .timeline-node:nth-child(6) { animation-delay: 400ms; }

        @keyframes nodeAppear {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .node-dot {
            position: absolute;
            left: -32px;
            top: 24px;
            width: 16px;
            height: 16px;
            background: var(--bg-secondary);
            border: 3px solid var(--accent-primary);
            border-radius: 50%;
            z-index: 1;
        }

        .node-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        /* Event Card */
        .event-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 250ms ease;
            position: relative;
        }

        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow-hover);
            border-color: var(--accent-light);
        }

        .event-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 12px;
        }

        .event-source {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .source-logo {
            width: 20px;
            height: 20px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .source-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--accent-primary);
            font-weight: 500;
        }

        .event-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
            margin-bottom: 10px;
            transition: color 200ms ease;
        }

        .event-card:hover .event-title {
            color: var(--accent-primary);
        }

        .event-summary {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 16px;
        }

        /* AI Commentary */
        .ai-commentary {
            background: var(--accent-secondary-light);
            border-left: 3px solid var(--accent-secondary);
            border-radius: 0 8px 8px 0;
            padding: 12px 16px;
            margin-bottom: 16px;
        }

        .ai-commentary-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .ai-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-secondary);
            background: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ai-text {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        /* Event Footer */
        .event-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .event-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .event-tag {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 4px;
            color: #fff;
        }

        .event-tag.policy { background: var(--type-policy); }
        .event-tag.funding { background: var(--type-funding); }
        .event-tag.product { background: var(--type-product); }
        .event-tag.ma { background: var(--type-ma); }
        .event-tag.tech { background: var(--type-tech); }
        .event-tag.report { background: var(--type-report); }
        .event-tag.person { background: var(--type-person); }

        .event-link {
            font-size: 13px;
            color: var(--accent-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 200ms ease;
        }

        .event-link:hover {
            color: var(--accent-hover);
        }

        /* ===== Empty State ===== */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
        }

        .empty-illustration {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            background: var(--bg-tertiary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty-title {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 24px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 15px;
            color: var(--text-muted);
        }

        /* ===== Responsive ===== */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                padding: 24px;
                gap: 24px;
            }

            .sidebar {
                position: static;
                order: -1;
            }

            .sidebar-section:first-child {
                display: none;
            }

            .filter-list {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
            }

            .filter-item {
                padding: 8px 12px;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 16px 20px;
            }

            .tagline {
                display: none;
            }

            .hero {
                padding: 24px 20px 32px;
            }

            .hero-title {
                font-size: 24px;
            }

            .search-panel {
                padding: 20px;
            }

            .search-row {
                flex-direction: column;
            }

            .time-range-group {
                width: 100%;
                justify-content: space-between;
            }

            .time-btn {
                flex: 1;
                text-align: center;
                padding: 10px 8px;
                font-size: 12px;
            }

            .generate-btn {
                width: 100%;
                justify-content: center;
            }

            .timeline {
                padding-left: 24px;
            }

            .timeline::before {
                left: 5px;
            }

            .node-dot {
                left: -24px;
                width: 12px;
                height: 12px;
            }
        }

        /* ===== Icons ===== */
        .icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .icon-sm {
            width: 14px;
            height: 14px;
        }

        .icon-xs {
            width: 12px;
            height: 12px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <div class="logo-icon">
                <svg class="icon" viewBox="0 0 24 24" style="width:20px;height:20px;">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
            </div>
            <span class="logo-text">IndustryPulse</span>
        </div>
        <span class="tagline">产业热点 · 时间脉络 · AI洞察</span>
    </header>

    <!-- Hero Input -->
    <section class="hero">
        <div class="hero-inner">
            <h1 class="hero-title">探索产业发展脉络</h1>
            <p class="hero-subtitle">输入关键词，自动生成产业热点事件时间轴</p>

            <div class="search-panel">
                <div class="input-group">
                    <label class="input-label">产业关键词</label>
                    <div class="keyword-input-wrapper">
                        <input type="text" class="keyword-input" id="keywordInput" placeholder="例如：人工智能、新能源汽车、半导体...">
                        <svg class="icon input-icon" viewBox="0 0 24 24" style="width:20px;height:20px;">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>
                    <div class="quick-tags" style="margin-top: 12px;">
                        <span class="quick-tag" data-keyword="人工智能">人工智能</span>
                        <span class="quick-tag" data-keyword="新能源汽车">新能源汽车</span>
                        <span class="quick-tag" data-keyword="半导体">半导体</span>
                        <span class="quick-tag" data-keyword="医疗健康">医疗健康</span>
                        <span class="quick-tag" data-keyword="元宇宙">元宇宙</span>
                    </div>
                </div>

                <div class="search-row">
                    <div class="input-group" style="flex: 0 0 auto;">
                        <label class="input-label">时间范围</label>
                        <div class="time-range-group">
                            <button class="time-btn" data-range="week">近一周</button>
                            <button class="time-btn active" data-range="month">近一月</button>
                            <button class="time-btn" data-range="quarter">近一季</button>
                            <button class="time-btn" data-range="halfyear">近半年</button>
                            <button class="time-btn" data-range="year">近一年</button>
                        </div>
                    </div>

                    <button class="generate-btn" id="generateBtn">
                        <svg class="icon" viewBox="0 0 24 24" style="width:18px;height:18px;">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        生成时间轴
                    </button>
                </div>
            </div>

                url: '#'

        // DOM elements
        const keywordInput = document.getElementById('keywordInput');
        const generateBtn = document.getElementById('generateBtn');
        const filterList = document.getElementById('filterList');
        const timeline = document.getElementById('timeline');
        const quickTags = document.querySelectorAll('.quick-tag');
        const timeBtns = document.querySelectorAll('.time-btn');

        // Source logo map
        const sourceLogos = {
            '机器之心': '机',
            '36Kr': '36',
            '虎嗅': '虎',
            '雷锋网': '雷',
            '财经网': '财'
        };

        // Render timeline
        function renderTimeline(data) {
            timeline.innerHTML = data.map(item => `
                <div class="timeline-node" data-type="${item.type}">
                    <div class="node-dot"></div>
                    <div class="node-date">${item.date}</div>
                    <div class="event-card">
                        <div class="event-source">
                            <span class="source-logo">${sourceLogos[item.source] || item.source.slice(0, 2)}</span>
                            <span class="source-name">${item.source}</span>
                        </div>
                        <h3 class="event-title">${item.title}</h3>
                        <p class="event-summary">${item.summary}</p>
                        <div class="ai-commentary">
                            <div class="ai-commentary-header">
                                <span class="ai-badge">
                                    <svg class="icon icon-xs" viewBox="0 0 24 24">
                                        <path d="M12 2a10 10 0 1 0 10 10H12V2z"></path>
                                        <path d="M12 2a7 7 0 0 1 7 7h-7V2z" fill="currentColor"></path>
                                    </svg>
                                    AI 点评
                                </span>
                            </div>
                            <p class="ai-text">${item.aiCommentary}</p>
                        </div>
                        <div class="event-footer">
                            <div class="event-tags">
                                <span class="event-tag ${item.type}">${item.typeName}</span>
                            </div>
                            <a href="${item.url}" class="event-link" target="_blank">
                                阅读原文
                                <svg class="icon icon-sm" viewBox="0 0 24 24">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                    <polyline points="15 3 21 3 21 9"></polyline>
                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Filter handlers
        filterList.addEventListener('click', (e) => {
            const filterItem = e.target.closest('.filter-item');
            if (!filterItem) return;

            const type = filterItem.dataset.type;

            if (type === 'all') {
                // Toggle all filters
                const allActive = [...filterList.querySelectorAll('.filter-item')].every(
                    item => item.classList.contains('active')
                );
                filterList.querySelectorAll('.filter-item').forEach(item => {
                    if (allActive) {
                        item.classList.remove('active');
                    } else {
                        item.classList.add('active');
                    }
                });
            } else {
                filterItem.classList.toggle('active');
                // Check if all individual filters are active
                const individualFilters = [...filterList.querySelectorAll('.filter-item:not([data-type="all"])')];
                const allSelected = individualFilters.every(item => item.classList.contains('active'));
                const allFilter = filterList.querySelector('[data-type="all"]');
                allFilter.classList.toggle('active', allSelected);
            }

            applyFilters();
        });

        function applyFilters() {
            const activeFilters = [...filterList.querySelectorAll('.filter-item.active')]
                .map(item => item.dataset.type)
                .filter(type => type !== 'all');

            const nodes = timeline.querySelectorAll('.timeline-node');
            nodes.forEach(node => {
                const type = node.dataset.type;
                if (activeFilters.includes(type)) {
                    node.style.display = 'block';
                } else {
                    node.style.display = 'none';
                }
            });
        }

        // Quick tags
        quickTags.forEach(tag => {
            tag.addEventListener('click', () => {
                keywordInput.value = tag.dataset.keyword;
            });
        });

        // Time range buttons
        timeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                timeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Generate button
        generateBtn.addEventListener('click', () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                keywordInput.focus();
                keywordInput.style.borderColor = '#DC2626';
                setTimeout(() => {
                    keywordInput.style.borderColor = '';
                }, 1000);
                return;
            }
            // In a real app, this would trigger data fetching
            alert(`正在为 "${keyword}" 生成时间轴...`);
        });

        // Initial render
        renderTimeline(timelineData);
